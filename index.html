<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Nest - Balistic Calculator</title>
    <style>
        :root {
            /* --- THEME SOMBRE RADICAL (Bunker / Nuit) --- */
            --bg-color: #0d0c0a;        /* Noir d'encre militaire très profond */
            --panel-bg: #161412;        /* Gris-brun très sombre (acier/cuir vieilli) */
            --text-color: #abb2a0;      /* Vert-gris pâle (style vision nocturne / texte militaire estompé) */
            --text-muted: #646b5c;      /* Texte secondaire très sombre */
            --accent-color: #d1361b;    /* Rouge alerte / Tampon lumineux */
            --accent-hover: #ff4524;    
            --border-color: #2b2621;    /* Bordure sombre et discrète */
            --input-bg: #100f0d;        /* Entrées quasi noires */
            --header-bg: #090807;       
            --header-text: #8e9685;
            --highlight-bg: rgba(209, 54, 27, 0.1);
        }

        [data-theme="light"] {
            /* --- THEME CLAIR RADICAL (Papier / Jour) --- */
            --bg-color: #d9ceb2;        /* Papier beige / Parchemin militaire usé */
            --panel-bg: #e6dfcc;        /* Papier légèrement plus clair */
            --text-color: #2b251a;      /* Encre brune / noire usée */
            --text-muted: #5c5343;      
            --accent-color: #8c2d19;    /* Rouge brique / Tampon officiel */
            --accent-hover: #b03a24;    
            --border-color: #4a4031;    /* Bordures encre brune épaisse */
            --input-bg: #f0ebd8;        
            --header-bg: #2d261d;       
            --header-text: #d9ceb2;
            --highlight-bg: rgba(140, 45, 25, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, Georgia, serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.2s, color 0.2s, border-color 0.2s;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: var(--header-bg);
            color: var(--header-text);
            border: 3px double var(--border-color);
            margin-bottom: 25px;
        }

        h1 {
            font-size: 1.3rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            background-color: var(--panel-bg);
            color: var(--text-color);
            border: 2px solid var(--border-color);
            padding: 6px 12px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        button:hover {
            background-color: var(--accent-color);
            color: #ffffff;
            border-color: var(--accent-color);
        }

        header button {
            background-color: transparent;
            color: var(--header-text);
            border-color: var(--header-text);
        }

        header button:hover {
            background-color: var(--header-text);
            color: var(--header-bg);
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            flex: 1;
        }

        @media (min-width: 768px) {
            .main-container {
                grid-template-columns: 1fr 1fr;
            }
        }

        .panel {
            background-color: var(--panel-bg);
            border: 3px double var(--border-color);
            padding: 25px;
            position: relative;
        }

        .panel::before {
            content: "✦";
            position: absolute;
            top: 5px;
            left: 5px;
            font-size: 0.8rem;
            color: var(--border-color);
            opacity: 0.6;
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 25px;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 8px;
            color: var(--text-color);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        input, select {
            width: 100%;
            padding: 10px;
            background-color: var(--input-bg);
            border: 2px solid var(--border-color);
            color: var(--text-color);
            font-size: 1.1rem;
            font-weight: 700;
            font-family: monospace;
            border-radius: 0;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px dashed var(--border-color);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-muted);
        }

        .result-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-color);
            padding: 2px 8px;
            font-family: monospace;
        }

        .result-value.highlight {
            color: var(--accent-color);
            border: 2px dashed var(--accent-color);
            padding: 2px 12px;
            background-color: var(--highlight-bg);
            transform: rotate(-0.5deg);
        }

        .notice-section {
            margin-top: 25px;
            background-color: var(--panel-bg);
            border: 3px double var(--border-color);
            padding: 22px;
        }

        .notice-section h3 {
            margin-bottom: 12px;
            text-transform: uppercase;
            color: var(--text-color);
            font-size: 0.95rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
        }

        .notice-section ol {
            padding-left: 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .notice-section li {
            margin-bottom: 6px;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="app-title">Iron Nest - Calculateur Balistique</h1>
        <div class="controls">
            <button id="btn-lang" onclick="toggleLanguage()">EN</button>
            <button id="btn-theme" onclick="toggleTheme()">☀️ / 🌙</button>
        </div>
    </header>

    <div class="main-container">
        <div class="panel">
            <div class="panel-title" id="title-inputs">Données de Saisie</div>
            
            <div class="form-group">
                <label for="input-distance" id="lbl-distance">Distance à la cible (km)</label>
                <input type="number" id="input-distance" step="0.01" min="0.1" max="30.0" placeholder="Ex: 12.34" oninput="calculate()">
            </div>

            <div class="form-group">
                <label for="input-azimut" id="lbl-azimut">Azimut cible (°)</label>
                <input type="number" id="input-azimut" step="0.1" min="0" max="360" placeholder="Ex: 35.0" oninput="calculate()">
            </div>

            <div class="form-group">
                <label for="input-shell" id="lbl-shell">Type d'obus</label>
                <select id="input-shell" onchange="calculate()">
                    <option value="AP" selected>AP (Armor Piercing)</option>
                    <option value="HE">HE / Autre</option>
                </select>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title" id="title-results">Paramètres de Tir Requis</div>
            
            <div class="result-item">
                <span class="result-label" id="res-charges-lbl">Charges Propulsives (P.C.)</span>
                <span class="result-value highlight" id="res-charges">-</span>
            </div>

            <div class="result-item">
                <span class="result-label" id="res-elevation-lbl">Élévation du Canon</span>
                <span class="result-value highlight" id="res-elevation">-</span>
            </div>

            <div class="result-item">
                <span class="result-label" id="res-azimut-lbl">Azimut Final (Tourelle)</span>
                <span class="result-value" id="res-azimut">-</span>
            </div>

            <div class="result-item">
                <span class="result-label" id="res-range-lbl">Palier de Distance Table</span>
                <span class="result-value" id="res-range">-</span>
            </div>
        </div>
    </div>

    <div class="notice-section">
        <h3 id="notice-title">Comment utiliser le calculateur</h3>
        <ol id="notice-steps">
        </ol>
    </div>

    <script>
        const balisticTable = {
            1: { coef: 0.12, steps: { 0.1: 1.20, 0.5: 6.00, 1.0: 12.00, 2.0: 24.00, 3.0: 36.00, 4.0: 48.00, 5.0: 60.00 } },
            2: { coef: 0.06, steps: { 5.1: 30.60, 6.0: 36.00, 7.0: 42.00, 8.0: 48.00, 9.0: 54.00, 10.0: 60.00 } },
            3: { coef: 0.04, steps: { 10.1: 40.40, 11.0: 44.00, 12.0: 48.00, 13.0: 52.00, 14.0: 56.00, 15.0: 60.00 } },
            4: { coef: 0.03, steps: { 15.1: 45.30, 16.0: 48.00, 17.0: 51.00, 18.0: 54.00, 19.0: 57.00, 20.0: 60.00 } },
            5: { coef: 0.02, steps: { 20.1: 48.24, 21.0: 52.00, 22.0: 52.80, 23.0: 55.20, 24.0: 57.60, 25.0: 60.00 } },
            6: { coef: 0.02, steps: { 25.1: 50.20, 26.0: 52.00, 27.0: 54.00, 28.0: 56.00, 29.0: 58.00, 30.0: 60.00 } }
        };

        const i18n = {
            fr: {
                title: "Iron Nest - Calculateur Balistique", inputs: "Données de Saisie",
                distance: "Distance à la cible (km)", azimut: "Azimut cible (°)", shell: "Type d'obus",
                results: "Paramètres de Tir Requis", charges: "Charges Propulsives (P.C.)",
                elevation: "Élévation du Canon", azimut_res: "Azimut Final (Tourelle)", range_res: "Palier de Distance Table",
                notice_title: "Comment utiliser le calculateur",
                steps: [
                    "Relevez la distance et l'azimut de votre cible sur la carte tactique.",
                    "Saisissez ces valeurs dans la partie gauche du calculateur.",
                    "Sélectionnez le type d'obus.",
                    "Configurez votre pupitre de tir avec les résultats affichés.",
                    "Faites feu !"
                ]
            },
            en: {
                title: "Iron Nest - Ballistic Calculator", inputs: "Input Data",
                distance: "Target Distance (km)", azimut: "Target Bearing (°)", shell: "Shell Type",
                results: "Required Firing Data", charges: "Powder Charges (P.C.)",
                elevation: "Gun Elevation", azimut_res: "Final Bearing (Turret)", range_res: "Table Base Range",
                notice_title: "How to use the calculator",
                steps: [
                    "Measure target's bearing and range on the tactical map.",
                    "Enter these values into the left side of the calculator.",
                    "Select your shell type.",
                    "Adjust your turret/station with the calculated results.",
                    "Fire!"
                ]
            }
        };

        let currentLang = 'fr';

        function calculate() {
            const distance = parseFloat(document.getElementById('input-distance').value);
            const azimut = parseFloat(document.getElementById('input-azimut').value);
            const shellType = document.getElementById('input-shell').value;

            if (isNaN(distance) || distance < 0.1 || distance > 30.0) {
                resetResults();
                return;
            }

            const pc = Math.ceil(distance / 5);
            const baseRange = Math.floor(distance * 10) / 10;
            const palierData = balisticTable[pc];
            if (!palierData) return;

            // Approximation simple si le palier exact n'est pas codé en dur
            const keys = Object.keys(palierData.steps).map(Number);
            const closestKey = keys.reduce((prev, curr) => Math.abs(curr - distance) < Math.abs(prev - distance) ? curr : prev);
            const baseElevation = palierData.steps[closestKey];
            let finalElevation = baseElevation;

            if (shellType === "AP") {
                const diff = distance - closestKey;
                finalElevation = baseElevation + (palierData.coef * (diff / 0.01));
            }

            document.getElementById('res-charges').innerText = `P.C. ${pc}`;
            document.getElementById('res-elevation').innerText = isNaN(finalElevation) ? "-" : `${finalElevation.toFixed(2)}°`;
            document.getElementById('res-azimut').innerText = isNaN(azimut) ? "-" : `${azimut.toFixed(1)}°`;
            document.getElementById('res-range').innerText = `${closestKey.toFixed(1)} km`;
        }

        function resetResults() {
            document.getElementById('res-charges').innerText = "-";
            document.getElementById('res-elevation').innerText = "-";
            document.getElementById('res-azimut').innerText = "-";
            document.getElementById('res-range').innerText = "-";
        }

        function toggleLanguage() {
            currentLang = currentLang === 'fr' ? 'en' : 'fr';
            document.getElementById('btn-lang').innerText = currentLang === 'fr' ? 'EN' : 'FR';
            updateUIStrings();
        }

        function updateUIStrings() {
            const data = i18n[currentLang];
            document.getElementById('app-title').innerText = data.title;
            document.getElementById('title-inputs').innerText = data.inputs;
            document.getElementById('lbl-distance').innerText = data.distance;
            document.getElementById('lbl-azimut').innerText = data.azimut;
            document.getElementById('lbl-shell').innerText = data.shell;
            document.getElementById('title-results').innerText = data.results;
            document.getElementById('res-charges-lbl').innerText = data.charges;
            document.getElementById('res-elevation-lbl').innerText = data.elevation;
            document.getElementById('res-azimut-lbl').innerText = data.azimut_res;
            document.getElementById('res-range-lbl').innerText = data.range_res;
            document.getElementById('notice-title').innerText = data.notice_title;

            const stepsOl = document.getElementById('notice-steps');
            stepsOl.innerHTML = "";
            data.steps.forEach(step => {
                const li = document.createElement('li');
                li.innerText = step;
                stepsOl.appendChild(li);
            });
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        window.onload = () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateUIStrings();
        };
    </script>
</body>
</html>
