<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Nest - Calculateur Balistique</title>

    <meta name="description" content="Calculateur balistique externe pour Iron Nest. Saisissez distance et azimut, obtenez instantanément l'élévation du canon, les charges propulsives et le temps de vol de l'obus. Outil gratuit, ultra-léger, pensé pour un second écran.">

    <!-- Open Graph / Facebook, Discord, etc. -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://iron-nest-calculator.pages.dev/">
    <meta property="og:title" content="Iron Nest - Calculateur Balistique">
    <meta property="og:description" content="Calculateur balistique externe pour Iron Nest. Distance et azimut → élévation, charges propulsives et temps de vol instantanés. Idéal pour un second écran.">
    <meta property="og:image" content="https://iron-nest-calculator.pages.dev/og-cover.png">
    <meta property="og:locale" content="fr_FR">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Iron Nest - Calculateur Balistique">
    <meta name="twitter:description" content="Distance et azimut → élévation, charges propulsives et temps de vol instantanés. Outil externe gratuit pour Iron Nest.">
    <meta name="twitter:image" content="https://iron-nest-calculator.pages.dev/og-cover.png">

    <style>
        :root {
            /* --- THEME SOMBRE RADICAL (Bunker de nuit) --- */
            --bg-color: #0a0a09;        /* Presque noir pur */
            --panel-bg: #131210;        /* Gris-brun sombre, lisible */
            --text-color: #d8ddd0;      /* Vert-gris militaire clair, contraste élevé */
            --text-muted: #8a9180;      /* Texte secondaire toujours lisible */
            --accent-color: #e8421f;    /* Rouge alerte vif */
            --accent-hover: #ff5a32;
            --border-color: #3a3833;    /* Bordures visibles */
            --input-bg: #0e0d0b;
            --header-bg: #060605;
            --header-text: #c7cdbc;
            --highlight-bg: rgba(232, 66, 31, 0.12);
            --shadow-color: rgba(0, 0, 0, 0.6);
        }

        [data-theme="light"] {
            /* --- THEME CLAIR RADICAL (Carte d'état-major de jour) --- */
            --bg-color: #d9ceb2;        /* Vieux papier de carte */
            --panel-bg: #e6dfcc;        
            --text-color: #2b251a;      /* Encre brune */
            --text-muted: #5c5343;      
            --accent-color: #8c2d19;    /* Rouge tampon officiel */
            --accent-hover: #b03a24;    
            --border-color: #4a4031;    
            --input-bg: #f0ebd8;        
            --header-bg: #2d261d;       
            --header-text: #d9ceb2;
            --highlight-bg: rgba(140, 45, 25, 0.05);
            --shadow-color: rgba(43, 37, 26, 0.18);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, Georgia, serif;
        }

        html {
            background-color: var(--bg-color);
        }

        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 15% 0%, var(--highlight-bg) 0%, transparent 45%),
                repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px);
            color: var(--text-color);
            transition: background-color 0.2s, color 0.2s;
            padding: 24px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: var(--header-bg);
            color: var(--header-text);
            border: 3px double var(--border-color);
            margin-bottom: 25px;
        }

        h1 {
            font-size: 1.3rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        button, select.select-lang {
            background-color: var(--panel-bg);
            color: var(--text-color);
            border: 2px solid var(--border-color);
            padding: 6px 12px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.2s;
            border-radius: 0;
        }

        button:hover {
            background-color: var(--accent-color);
            color: #ffffff;
            border-color: var(--accent-color);
        }

        header button, header select.select-lang {
            background-color: transparent;
            color: var(--header-text);
            border-color: var(--header-text);
        }

        header button:hover, header select.select-lang:hover {
            background-color: var(--header-text);
            color: var(--header-bg);
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            flex: 1;
        }

        @media (min-width: 768px) {
            .main-container {
                grid-template-columns: 1fr 1fr;
            }
        }

        .panel {
            background-color: var(--panel-bg);
            border: 3px double var(--border-color);
            padding: 25px;
            position: relative;
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 25px;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 8px;
            color: var(--text-color);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        input, select {
            width: 100%;
            padding: 10px;
            background-color: var(--input-bg);
            border: 2px solid var(--border-color);
            color: var(--text-color);
            font-size: 1.1rem;
            font-weight: 700;
            font-family: monospace;
            border-radius: 0;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px dashed var(--border-color);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-muted);
        }

        .result-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-color);
            padding: 2px 8px;
            font-family: monospace;
        }

        .result-value.highlight {
            color: var(--accent-color);
            border: 2px dashed var(--accent-color);
            padding: 2px 12px;
            background-color: var(--highlight-bg);
        }

        .notice-section {
            margin-top: 25px;
            background-color: var(--panel-bg);
            border: 3px double var(--border-color);
            padding: 22px;
        }

        .notice-section h3 {
            margin-bottom: 12px;
            text-transform: uppercase;
            color: var(--text-color);
            font-size: 0.95rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
        }

        .notice-section ol {
            padding-left: 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .notice-section li {
            margin-bottom: 6px;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="app-title">Iron Nest - Calculateur Balistique</h1>
        <div class="controls">
            <select class="select-lang" id="select-lang" onchange="changeLanguage(this.value)">
                <option value="fr" selected>FR</option>
                <option value="en">EN</option>
                <option value="de">DE</option>
                <option value="ru">RU</option>
                <option value="zh">ZH</option>
            </select>
            <button id="btn-theme" onclick="toggleTheme()">☀️ / 🌙</button>
        </div>
    </header>

    <div class="main-container">
        <div class="panel">
            <div class="panel-title" id="title-inputs">Données de Saisie</div>
            
            <div class="form-group">
                <label for="input-distance" id="lbl-distance">Distance à la cible (km)</label>
                <input type="number" id="input-distance" step="0.01" min="0.1" max="30.0" placeholder="Ex: 5.33" oninput="calculate()">
            </div>

            <div class="form-group">
                <label for="input-azimut" id="lbl-azimut">Azimut cible (°)</label>
                <input type="number" id="input-azimut" step="0.1" min="0" max="360" placeholder="Ex: 70.3" oninput="calculate()">
            </div>

            <div class="form-group">
                <label for="input-shell" id="lbl-shell">Type d'obus</label>
                <select id="input-shell" onchange="calculate()">
                    <option value="STANDARD" selected>Standard / HE / AP</option>
                </select>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title" id="title-results">Paramètres de Tir Requis</div>
            
            <div class="result-item">
                <span class="result-label" id="res-charges-lbl">Charges Propulsives (P.C.)</span>
                <span class="result-value highlight" id="res-charges">-</span>
            </div>

            <div class="result-item">
                <span class="result-label" id="res-elevation-lbl">Élévation du Canon</span>
                <span class="result-value highlight" id="res-elevation">-</span>
            </div>

            <div class="result-item">
                <span class="result-label" id="res-azimut-lbl">Azimut Final (Tourelle)</span>
                <span class="result-value" id="res-azimut">-</span>
            </div>

            <div class="result-item">
                <span class="result-label" id="res-range-lbl">Palier de Base Table</span>
                <span class="result-value" id="res-range">-</span>
            </div>

            <div class="result-item" style="border-top: 2px solid var(--border-color); margin-top: 10px; padding-top: 15px;">
                <span class="result-label" id="res-time-lbl">Temps estimé avant l'impact</span>
                <span class="result-value" id="res-time">-</span>
            </div>

            <div class="result-item">
                <span class="result-label" id="res-dispersion-lbl">Rayon d'Erreur (Dispersion)</span>
                <span class="result-value" id="res-dispersion" style="color: var(--accent-hover); font-weight: bold;">-</span>
            </div>
        </div>
    </div>

    <div class="notice-section">
        <h3 id="notice-title">Comment utiliser le calculateur</h3>
        <ol id="notice-steps">
        </ol>
    </div>

    <script>
        // Table balistique
        const balisticTable = {
            1: { coef: 0.12, steps: { 0.1: 1.20, 1.0: 12.00, 2.0: 24.00, 3.0: 36.00, 4.0: 48.00, 5.0: 60.00 } },
            2: { coef: 0.06, steps: { 5.1: 30.60, 6.0: 36.00, 7.0: 42.00, 8.0: 48.00, 9.0: 54.00, 10.0: 60.00 } },
            3: { coef: 0.04, steps: { 10.1: 40.40, 11.0: 44.00, 12.0: 48.00, 13.0: 52.00, 14.0: 56.00, 15.0: 60.00 } },
            4: { coef: 0.03, steps: { 15.1: 45.30, 16.0: 48.00, 17.0: 51.00, 18.0: 54.00, 19.0: 57.00, 20.0: 60.00 } },
            5: { coef: 0.02, steps: { 20.1: 48.24, 21.0: 50.40, 22.0: 52.80, 23.0: 55.20, 24.0: 57.60, 25.0: 60.00 } },
            6: { coef: 0.02, steps: { 25.1: 50.20, 26.0: 52.00, 27.0: 54.00, 28.0: 56.00, 29.0: 58.00, 30.0: 60.00 } }
        };

        const i18n = {
            fr: {
                title: "Iron Nest - Calculateur Balistique", inputs: "Données de Saisie",
                distance: "Distance à la cible (km)", azimut: "Azimut cible (°)", shell: "Type d'obus",
                results: "Paramètres de Tir Requis", charges: "Charges Propulsives (P.C.)",
                elevation: "Élévation du Canon", azimut_res: "Azimut Final (Tourelle)", range_res: "Palier de Base Table",
                time_lbl: "Temps estimé avant l'impact", dispersion_lbl: "Rayon d'Erreur (Dispersion)",
                notice_title: "Comment utiliser le calculateur",
                steps: [
                    "Relevez la distance et l'azimut de votre cible sur la carte tactique.",
                    "Saisissez ces valeurs dans la partie gauche du calculateur (ou utilisez [/] et [*] sur le pavé numérique).",
                    "Vérifiez l'élévation, le temps de vol de l'obus ainsi que la dispersion théorique à droite.",
                    "Ajustez vos équipements en jeu et ouvrez le feu !"
                ]
            },
            en: {
                title: "Iron Nest - Ballistic Calculator", inputs: "Input Data",
                distance: "Target Distance (km)", azimut: "Target Bearing (°)", shell: "Shell Type",
                results: "Required Firing Data", charges: "Powder Charges (P.C.)",
                elevation: "Gun Elevation", azimut_res: "Final Bearing (Turret)", range_res: "Table Base Range",
                time_lbl: "Estimated Impact Time", dispersion_lbl: "Error Radius (Dispersion)",
                notice_title: "How to use the calculator",
                steps: [
                    "Measure target's bearing and range on the tactical map.",
                    "Enter these values on the left side (or use [/] and [*] on your Numpad).",
                    "Review target elevation, shell travel time and expected dispersion radius on the right.",
                    "Set your in-game station and fire!"
                ]
            },
            de: {
                title: "Iron Nest - Ballistischer Rechner", inputs: "Eingabedaten",
                distance: "Zielentfernung (km)", azimut: "Zielrichtung (°)", shell: "Granatentyp",
                results: "Erforderliche Schussdaten", charges: "Treibladungen (P.C.)",
                elevation: "Geschützerhöhung", azimut_res: "Endgültige Richtung (Turm)", range_res: "Tabellen-Basisreichweite",
                time_lbl: "Geschätzte Zeit bis zum Aufprall", dispersion_lbl: "Fehlerradius (Streuung)",
                notice_title: "Bedienungsanleitung des Rechners",
                steps: [
                    "Messen Sie Richtung und Entfernung des Ziels auf der taktischen Karte.",
                    "Geben Sie diese Werte auf der linken Seite ein (oder nutzen Sie [/] und [*] auf dem Nummernblock).",
                    "Überprüfen Sie die Geschützerhöhung, Flugzeit der Granate sowie den theoretischen Streuradius rechts.",
                    "Stellen Sie Ihre Station im Spiel ein und feuern Sie!"
                ]
            },
            ru: {
                title: "Iron Nest - Баллистический Калькулятор", inputs: "Входные Данные",
                distance: "Дистанция до цели (км)", azimut: "Азимут цели (°)", shell: "Тип снаряда",
                results: "Необходимые Параметры Стрельбы", charges: "Пороховые Заряды (P.C.)",
                elevation: "Угол Наклона Орудия", azimut_res: "Итоговый Азимут (Башня)", range_res: "Базовый Уровень Таблицы",
                time_lbl: "Расчетное время до удара", dispersion_lbl: "Радиус Погрешности (Разброс)",
                notice_title: "Как использовать калькулятор",
                steps: [
                    "Определите азимут и расстояние до вашей цели на тактической карте.",
                    "Введите эти значения в левой части калькулятора (или используйте [/] и [*] на цифровой клавиатуре).",
                    "Проверьте угол наклона орудия, время полета снаряда и теоретический разброс справа.",
                    "Настройте ваше орудие в игре и открывайте огонь!"
                ]
            },
            zh: {
                title: "Iron Nest - 弹道 Моделирование 计算器", inputs: "输入数据",
                distance: "目标距离 (公里)", azimut: "目标方位角 (°)", shell: "炮弹类型",
                results: "所需射击 strike 参数", charges: "推进药包 (P.C.)",
                elevation: "火炮仰角", azimut_res: "最终方位角 (炮塔)", range_res: "表基准范围",
                time_lbl: "预计命中时间", dispersion_lbl: "误差半径 (散布)",
                notice_title: "如何使用计算器",
                steps: [
                    "在战术地图上测量目标的方位角和距离。",
                    "在计算器左侧输入这些数值（或使用小键盘上的 [/] 和 [*]）。",
                    "确认右侧显示的火炮仰角、炮弹飞行时间以及理论散布半径。",
                    "调整您的游戏内炮位并开火！"
                ]
            }
        };

        let currentLang = 'fr';

        function calculate() {
            const distance = parseFloat(document.getElementById('input-distance').value);
            const azimut = parseFloat(document.getElementById('input-azimut').value);

            if (isNaN(distance) || distance < 0.1 || distance > 30.0) {
                resetResults();
                return;
            }

            const pc = Math.ceil(distance / 5);
            const palierData = balisticTable[pc];
            if (!palierData) return;

            const keys = Object.keys(palierData.steps).map(Number).sort((a, b) => b - a);
            const baseKey = keys.find(k => k <= distance) || keys[keys.length - 1];
            const baseElevation = palierData.steps[baseKey];

            const distanceDelta = distance - baseKey;
            const stepsOfTenMeters = distanceDelta / 0.01;
            const finalElevation = baseElevation + (palierData.coef * stepsOfTenMeters);

            const theoreticalDispersion = 12 + (distance * 4.5);
            const estimatedFlightTime = 4.0 + (distance * 1.85) + (pc * 0.5);

            document.getElementById('res-charges').innerText = `P.C. ${pc}`;
            document.getElementById('res-elevation').innerText = isNaN(finalElevation) ? "-" : `${finalElevation.toFixed(2)}°`;
            document.getElementById('res-azimut').innerText = isNaN(azimut) ? "-" : `${azimut.toFixed(1)}°`;
            document.getElementById('res-range').innerText = `${baseKey.toFixed(1)} km`;
            document.getElementById('res-time').innerText = `${estimatedFlightTime.toFixed(1)}s`;
            document.getElementById('res-dispersion').innerText = `± ${theoreticalDispersion.toFixed(1)} m`;
        }

        function resetResults() {
            document.getElementById('res-charges').innerText = "-";
            document.getElementById('res-elevation').innerText = "-";
            document.getElementById('res-azimut').innerText = "-";
            document.getElementById('res-range').innerText = "-";
            document.getElementById('res-time').innerText = "-";
            document.getElementById('res-dispersion').innerText = "-";
        }

        /* --- GESTIONNAIRE DES RACCOURCIS NUMPAD --- */
        function setupNumpadShortcuts() {
            window.addEventListener('keydown', (event) => {
                if (document.activeElement.tagName === 'TEXTAREA' || document.activeElement.tagName === 'INPUT') return;

                switch (event.key) {
                    case '/':
                        event.preventDefault();
                        const distInput = document.getElementById('input-distance');
                        distInput.focus();
                        distInput.select();
                        break;
                    case '*':
                        event.preventDefault();
                        const aziInput = document.getElementById('input-azimut');
                        aziInput.focus();
                        aziInput.select();
                        break;
                    case '-':
                        event.preventDefault();
                        toggleTheme();
                        break;
                }
            });
        }

        function changeLanguage(langCode) {
            currentLang = langCode;
            localStorage.setItem('lang', langCode);
            updateUIStrings();
        }

        function updateUIStrings() {
            const data = i18n[currentLang];
            document.getElementById('app-title').innerText = data.title;
            document.getElementById('title-inputs').innerText = data.inputs;
            document.getElementById('lbl-distance').innerText = data.distance;
            document.getElementById('lbl-azimut').innerText = data.azimut;
            document.getElementById('lbl-shell').innerText = data.shell;
            document.getElementById('title-results').innerText = data.results;
            document.getElementById('res-charges-lbl').innerText = data.charges;
            document.getElementById('res-elevation-lbl').innerText = data.elevation;
            document.getElementById('res-azimut-lbl').innerText = data.azimut_res;
            document.getElementById('res-range-lbl').innerText = data.range_res;
            document.getElementById('res-time-lbl').innerText = data.time_lbl;
            document.getElementById('res-dispersion-lbl').innerText = data.dispersion_lbl;
            document.getElementById('notice-title').innerText = data.notice_title;

            const stepsOl = document.getElementById('notice-steps');
            stepsOl.innerHTML = "";
            data.steps.forEach(step => {
                const li = document.createElement('li');
                li.innerText = step;
                stepsOl.appendChild(li);
            });
            
            // Forcer le recalcul visuel pour mettre à jour les unités/textes si des données sont présentes
            calculate();
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        window.onload = () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            
            const savedLang = localStorage.getItem('lang') || 'fr';
            document.getElementById('select-lang').value = savedLang;
            currentLang = savedLang;

            updateUIStrings();
            setupNumpadShortcuts();
        };
    </script>
</body>
</html>
