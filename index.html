<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Nest - Balistic Calculator</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --text-muted: #a0a0a0;
            --accent-color: #ff4500;
            --accent-hover: #ff5714;
            --border-color: #333333;
            --input-bg: #2d2d2d;
        }

        [data-theme="light"] {
            --bg-color: #f5f5f7;
            --panel-bg: #ffffff;
            --text-color: #1c1c1e;
            --text-muted: #6e6e73;
            --accent-color: #d32f2f;
            --accent-hover: #b71c1c;
            --border-color: #e5e5ea;
            --input-bg: #f2f2f7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            background-color: var(--panel-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover {
            border-color: var(--accent-color);
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            flex: 1;
        }

        @media (min-width: 768px) {
            .main-container {
                grid-template-columns: 1fr 1fr;
            }
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 20px;
        }

        .panel-title {
            font-size: 1.1rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 5px;
            color: var(--accent-color);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 10px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 4px;
            font-size: 1.1rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            font-size: 1rem;
            color: var(--text-muted);
        }

        .result-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-color);
        }

        .result-value.highlight {
            color: var(--accent-color);
        }

        .notice-section {
            margin-top: 20px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 20px;
        }

        .notice-section h3 {
            margin-bottom: 10px;
            color: var(--text-color);
        }

        .notice-section ol {
            padding-left: 20px;
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="app-title">Iron Nest - Calculateur Balistique</h1>
        <div class="controls">
            <button id="btn-lang" onclick="toggleLanguage()">EN</button>
            <button id="btn-theme" onclick="toggleTheme()">☀️ / 🌙</button>
        </div>
    </header>

    <div class="main-container">
        <div class="panel">
            <div class="panel-title" id="title-inputs">Données de Saisie</div>
            
            <div class="form-group">
                <label for="input-distance" id="lbl-distance">Distance à la cible (km)</label>
                <input type="number" id="input-distance" step="0.01" min="0.1" max="30.0" placeholder="Ex: 12.34" oninput="calculate()">
            </div>

            <div class="form-group">
                <label for="input-azimut" id="lbl-azimut">Azimut cible (°)</label>
                <input type="number" id="input-azimut" step="0.1" min="0" max="360" placeholder="Ex: 35.0" oninput="calculate()">
            </div>

            <div class="form-group">
                <label for="input-shell" id="lbl-shell">Type d'obus</label>
                <select id="input-shell" onchange="calculate()">
                    <option value="AP" selected>AP (Armor Piercing)</option>
                    <option value="HE">HE / Autre</option>
                </select>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title" id="title-results">Paramètres de Tir Requis</div>
            
            <div class="result-item">
                <span class="result-label" id="res-charges-lbl">Charges Propulsives (P.C.)</span>
                <span class="result-value highlight" id="res-charges">-</span>
            </div>

            <div class="result-item">
                <span class="result-label" id="res-elevation-lbl">Élévation du Canon</span>
                <span class="result-value highlight" id="res-elevation">-</span>
            </div>

            <div class="result-item">
                <span class="result-label" id="res-azimut-lbl">Azimut Final (Tourelle)</span>
                <span class="result-value" id="res-azimut">-</span>
            </div>

            <div class="result-item">
                <span class="result-label" id="res-range-lbl">Palier de Distance Table</span>
                <span class="result-value" id="res-range">-</span>
            </div>
        </div>
    </div>

    <div class="notice-section">
        <h3 id="notice-title">Comment utiliser le calculateur</h3>
        <ol id="notice-steps">
            </ol>
    </div>

    <script>

                }
            },

                }
            }
        };

        // --- TRADUCTIONS ---
        const i18n = {
            fr: {
                title: "Iron Nest - Calculateur Balistique",
                inputs: "Données de Saisie",
                distance: "Distance à la cible (km)",
                azimut: "Azimut cible (°)",
                shell: "Type d'obus",
                results: "Paramètres de Tir Requis",
                charges: "Charges Propulsives (P.C.)",
                elevation: "Élévation du Canon",
                azimut_res: "Azimut Final (Tourelle)",
                range_res: "Palier de Distance Table",
                notice_title: "Comment utiliser le calculateur",
                steps: [
                    "Relevez la distance et l'azimut de votre cible sur la carte tactique.",
                    "Saisissez ces valeurs dans la partie gauche du calculateur.",
                    "Sélectionnez le type d'obus (l'ajustement fin au centième s'applique sur les obus AP).",
                    "Configurez votre pupitre de tir avec les résultats affichés à droite : Charge propulsive, Azimut et Élévation.",
                    "Faites feu !"
                ]
            },
            en: {
                title: "Iron Nest - Ballistic Calculator",
                inputs: "Input Data",
                distance: "Target Distance (km)",
                azimut: "Target Bearing (°)",
                shell: "Shell Type",
                results: "Required Firing Data",
                charges: "Powder Charges (P.C.)",
                elevation: "Gun Elevation",
                azimut_res: "Final Bearing (Turret)",
                range_res: "Table Base Range",
                notice_title: "How to use the calculator",
                steps: [
                    "Measure target's bearing and range on the tactical map.",
                    "Enter these values into the left side of the calculator.",
                    "Select your shell type (Fine correction applies specifically to AP rounds).",
                    "Adjust your turret/station with the calculated results: Powder charges, Bearing and Elevation.",
                    "Fire!"
                ]
            }
        };

        let currentLang = 'fr';

        // --- INTERLOGIQUE ---
        function calculate() {
            const distance = parseFloat(document.getElementById('input-distance').value);
            const azimut = parseFloat(document.getElementById('input-azimut').value);
            const shellType = document.getElementById('input-shell').value;

            if (isNaN(distance) || distance < 0.1 || distance > 30.0) {
                resetResults();
                return;
            }

            // 1. Détermination du Palier de Charge (P.C.)
            const pc = Math.ceil(distance / 5);
            
            // 2. Recherche de la ligne immédiatement inférieure à la cible (Arrondi à 1 décimale inférieure)
            const baseRange = Math.floor(distance * 10) / 10;
            
            const palierData = balisticTable[pc];
            if (!palierData) return;

            // CORRECTION ICI : On utilise parseFloat pour chercher une clé numérique (ex: 12 ou 7.2) et non une chaîne "12.0"
            const searchKey = parseFloat(baseRange.toFixed(1));
            const baseElevation = palierData.steps[searchKey];
            
            let finalElevation = baseElevation;

            // 3. Calcul de la correction si AP (ou par défaut pour une précision absolue)
            if (baseElevation !== undefined) {
                const diff = distance - baseRange; // Reliquat en km (ex: 0.05)
                const stepsOfTenMeters = Math.round(diff / 0.01);
                
                if (shellType === "AP") {
                    finalElevation = baseElevation + (palierData.coef * stepsOfTenMeters);
                } else {
                    finalElevation = baseElevation; // Standard sans correction fine
                }
            }

            // Mettre à jour l'IHM
            document.getElementById('res-charges').innerText = `P.C. ${pc}`;
            document.getElementById('res-elevation').innerText = (baseElevation === undefined || isNaN(finalElevation)) ? "-" : `${finalElevation.toFixed(2)}°`;
            document.getElementById('res-azimut').innerText = isNaN(azimut) ? "-" : `${azimut.toFixed(1)}°`;
            document.getElementById('res-range').innerText = `${baseRange.toFixed(1)} km`;
        }

        function resetResults() {
            document.getElementById('res-charges').innerText = "-";
            document.getElementById('res-elevation').innerText = "-";
            document.getElementById('res-azimut').innerText = "-";
            document.getElementById('res-range').innerText = "-";
        }

        // --- THEME & GESTION DES LANGUES ---
        function toggleLanguage() {
            currentLang = currentLang === 'fr' ? 'en' : 'fr';
            document.getElementById('btn-lang').innerText = currentLang === 'fr' ? 'EN' : 'FR';
            updateUIStrings();
        }

        function updateUIStrings() {
            const data = i18n[currentLang];
            document.getElementById('app-title').innerText = data.title;
            document.getElementById('title-inputs').innerText = data.inputs;
            document.getElementById('lbl-distance').innerText = data.distance;
            document.getElementById('lbl-azimut').innerText = data.azimut;
            document.getElementById('lbl-shell').innerText = data.shell;
            document.getElementById('title-results').innerText = data.results;
            document.getElementById('res-charges-lbl').innerText = data.charges;
            document.getElementById('res-elevation-lbl').innerText = data.elevation;
            document.getElementById('res-azimut-lbl').innerText = data.azimut_res;
            document.getElementById('res-range-lbl').innerText = data.range_res;
            document.getElementById('notice-title').innerText = data.notice_title;

            const stepsOl = document.getElementById('notice-steps');
            stepsOl.innerHTML = "";
            data.steps.forEach(step => {
                const li = document.createElement('li');
                li.innerText = step;
                stepsOl.appendChild(li);
            });
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        // INIT
        window.onload = () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateUIStrings();
        };
    </script>
</body>
</html>
